# https://taskfile.dev

version: "3"

vars:
  REGISTRY: harbor-v2.dev.internal.adifoundation.ai/adi-chain/cli
  CACHE_REF_SLUG: '{{default "main" .CI_COMMIT_REF_SLUG}}'
  # Default platform to linux/arm64 for local dev (Apple Silicon friendly)
  PLATFORM: '{{default "linux/arm64" .PLATFORM}}'
  TARGETS: '{{default "default" .TARGETS}}'
  CI_COMMIT_SHORT_SHA:
    sh: git rev-parse --short HEAD || echo "unknown"

tasks:
  _install_rust:
    internal: true
    status:
      - rustc --version
    cmds:
      - curl https://sh.rustup.rs -sSf | sh

  fmt:
    desc: Format Rust code
    cmds:
      - cargo fmt

  lint:
    desc: Lint Rust code
    cmds:
      - cargo clippy -- -D warnings

  test:
    desc: Run Rust tests
    cmds:
      - cargo test

  build:
    desc: Build Rust binary
    deps:
      - _install_rust
    cmds:
      - cargo build

  # Internal task to build and push docker image for a specific architecture
  build:docker:internal:
    internal: true
    vars:
      ARCH_SLUG: '{{default "arm64" .ARCH_SLUG}}'
      REF_SLUG: '{{default "main" .CI_COMMIT_REF_SLUG}}'
      CACHE_TO_REF: '{{.REGISTRY}}/adi-toolkit:cache-{{.ARCH_SLUG}}-{{.REF_SLUG}}'
      LOAD: '{{default "true" .LOAD}}'
      PUSH: '{{default "false" .PUSH}}'
    cmds:
      - |
        # Calculate TAG_SUFFIX
        # Local (LOAD=true): Empty suffix (clean version tag)
        # Remote (PUSH=true): -branch-arch-sha (unique tracking tag)
        if [ "{{.LOAD}}" = "true" ]; then
          TAG_SUFFIX=""
        else
          TAG_SUFFIX="-{{.REF_SLUG}}-{{.ARCH_SLUG}}-{{.CI_COMMIT_SHORT_SHA}}"
        fi

        PLATFORM={{.PLATFORM}} \
        CACHE_TO_REF={{.CACHE_TO_REF}} \
        TAG_SUFFIX="$TAG_SUFFIX" \
        docker buildx bake -f docker/docker-bake.hcl \
        {{if eq .LOAD "true"}}--load{{end}} \
        {{if eq .PUSH "true"}}--push{{end}} \
        {{.TARGETS}}

  build:docker:amd64:
    desc: Build and push Docker image for linux/amd64
    cmds:
      - task: build:docker:internal
        vars: { PLATFORM: "linux/amd64", ARCH_SLUG: "amd64" }

  build:docker:arm64:
    desc: Build and push Docker image for linux/arm64
    cmds:
      - task: build:docker:internal
        vars: { PLATFORM: "linux/arm64", ARCH_SLUG: "arm64" }

  build:docker:manifest:
    desc: Create and push multiarch manifest
    vars:
      REF_SLUG: '{{default "main" .CI_COMMIT_REF_SLUG}}'
    cmds:
      - |
        # Extract base tag from HCL (e.g. registry/adi-toolkit:v30.0.2)
        # We run bake --print with empty suffix to get the clean target tag
        BASE_TAGS=$(TAG_SUFFIX="" docker buildx bake --print -f docker/docker-bake.hcl {{.TARGETS}} | jq -r '.target[].tags[0]')

        if [ -z "$BASE_TAGS" ] || [ "$BASE_TAGS" = "null" ]; then
          echo "Error: Could not extract base tags from docker-bake.hcl"
          exit 1
        fi

        for BASE_TAG in $BASE_TAGS; do
          echo "Processing Base Tag: $BASE_TAG"

          # Source images (pushed by build:docker:*)
          SRC_AMD64="${BASE_TAG}-{{.REF_SLUG}}-amd64-{{.CI_COMMIT_SHORT_SHA}}"
          SRC_ARM64="${BASE_TAG}-{{.REF_SLUG}}-arm64-{{.CI_COMMIT_SHORT_SHA}}"

          # 1. Mutable Branch Tag: v30.0.2-branch
          docker buildx imagetools create -t "${BASE_TAG}-{{.REF_SLUG}}" $SRC_AMD64 $SRC_ARM64

          # 2. Immutable Branch Tag: v30.0.2-branch-sha
          docker buildx imagetools create -t "${BASE_TAG}-{{.REF_SLUG}}-{{.CI_COMMIT_SHORT_SHA}}" $SRC_AMD64 $SRC_ARM64

          # 3. Version Tag (Main Only): v30.0.2
          if [ "{{.REF_SLUG}}" = "main" ]; then
            docker buildx imagetools create -t "${BASE_TAG}" $SRC_AMD64 $SRC_ARM64
          fi
        done
