# https://taskfile.dev

version: "3"

tasks:
  _install_rust:
    internal: true
    status:
      - rustc --version
    cmds:
      - curl https://sh.rustup.rs -sSf | sh

  build:
    desc: Build the CLI in development mode
    deps:
      - _install_rust
    cmds:
      - cargo build

  build:release:
    desc: Build the CLI in release mode
    deps:
      - _install_rust
    cmds:
      - cargo build --release

  # ====================
  # Testing
  # ====================

  test:
    desc: Run all tests
    deps:
      - _install_rust
    cmds:
      - cargo test --workspace

  test:unit:
    desc: Run unit tests only (library crates)
    deps:
      - _install_rust
    cmds:
      - cargo test --workspace --lib

  test:integration:
    desc: Run integration tests only
    deps:
      - _install_rust
    preconditions:
      - sh: 'find . -path ./target -prune -o -type f -path "*/tests/*.rs" -print -quit | grep -q .'
        msg: "No integration tests found (no */tests/*.rs files)"
    cmds:
      - cargo test --workspace --test '*'

  lint:
    desc: Run clippy linter with strict rules
    deps:
      - _install_rust
    cmds:
      - cargo clippy --workspace -- -D warnings

  fmt:
    desc: Format code with rustfmt
    deps:
      - _install_rust
    cmds:
      - cargo fmt

  fmt:check:
    desc: Check code formatting
    deps:
      - _install_rust
    cmds:
      - cargo fmt -- --check

  check:
    desc: Run all checks (fmt, lint, test)
    deps:
      - _install_rust
    cmds:
      - task: fmt:check
      - task: lint
      - task: test

  # ====================
  # Docker / Toolkit
  # ====================

  build:docker:
    desc: Build Docker images using Docker Bake
    vars:
      TARGETS: '{{default "default" .TARGETS}}'
    sources:
      - docker/worker/Dockerfile
      - docker/docker-bake.hcl
    generates:
      - .task/build_docker_{{.TARGETS}}
    preconditions:
      - docker ps
      - docker buildx version
      - docker buildx bake --help
    cmds:
      - docker buildx bake -f docker/docker-bake.hcl {{.TARGETS}}
      - mkdir -p .task && touch .task/build_docker_{{.TARGETS}}

  build:toolkit:
    desc: Build all toolkit images (v29 + v30)
    cmds:
      - task: build:docker
        vars:
          TARGETS: default

  build:toolkit:v29:
    desc: Build toolkit image for protocol v29
    cmds:
      - task: build:docker
        vars:
          TARGETS: toolkit-v29

  build:toolkit:v30:
    desc: Build toolkit image for protocol v30
    cmds:
      - task: build:docker
        vars:
          TARGETS: toolkit-v30

  build:toolkit:local:
    desc: Build toolkit image for local testing (current platform, faster)
    vars:
      VERSION: '{{default "v29" .VERSION}}'
      REGISTRY: harbor.sde.adifoundation.ai/adi-chain/cli
    preconditions:
      - docker ps
      - docker buildx version
    cmds:
      - docker buildx build -t {{.REGISTRY}}/adi-toolkit:{{.VERSION}} --load --file docker/worker/Dockerfile .

  build:toolkit:local:v29:
    desc: Build toolkit v29 image for local testing
    cmds:
      - task: build:toolkit:local
        vars:
          VERSION: v29

  build:toolkit:local:v30:
    desc: Build toolkit v30 image for local testing
    cmds:
      - task: build:toolkit:local
        vars:
          VERSION: v30

  push:docker:
    desc: Build and push Docker images using Docker Bake
    vars:
      TARGETS: '{{default "default" .TARGETS}}'
    cmds:
      - docker buildx bake -f docker/docker-bake.hcl --push {{.TARGETS}}

  push:toolkit:
    desc: Build and push all toolkit images
    cmds:
      - task: push:docker
        vars:
          TARGETS: default

  push:toolkit:v29:
    desc: Build and push toolkit v29 image
    cmds:
      - task: push:docker
        vars:
          TARGETS: toolkit-v29

  push:toolkit:v30:
    desc: Build and push toolkit v30 image
    cmds:
      - task: push:docker
        vars:
          TARGETS: toolkit-v30
